version: '3.8'

services:

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=jarvis
      - POSTGRES_PASSWORD=jarvis_db_2026
      - POSTGRES_DB=n8n
    volumes:
      - /home/daniel/ClusterStorage/data/postgres:/var/lib/postgresql/data
    networks:
      - jarvis-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == daniel-B450M-H
      restart_policy:
        condition: on-failure

  n8n:
    image: n8nio/n8n:latest
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_USER=jarvis
      - DB_POSTGRESDB_PASSWORD=jarvis_db_2026
      - DB_POSTGRESDB_DATABASE=n8n
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_PERSONALIZATION_ENABLED=false
      - N8N_ENCRYPTION_KEY=56f196edb63cd14f729de6a09d3899325a1513978455ef3d
      - N8N_USER_MANAGEMENT_JWT_SECRET=ca48646d1be2359c4211dde66c01c0feb68c707d943257008b33e0b15e9a9e0f
      - WEBHOOK_URL=http://10.42.0.154:5678
      - GENERIC_TIMEZONE=America/Cancun
      - N8N_DEFAULT_LOCALE=es
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - /home/daniel/ClusterStorage/data/n8n:/home/node/.n8n
    ports:
      - "5678:5678"
    networks:
      - jarvis-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == daniel-B450M-H
      restart_policy:
        condition: on-failure

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - /home/daniel/ClusterStorage/data/qdrant:/qdrant/storage
    networks:
      - jarvis-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == daniel-B450M-H
      restart_policy:
        condition: on-failure

  searxng:
    image: searxng/searxng:latest
    environment:
      - SEARXNG_BASE_URL=http://10.42.0.154:8888
      - SEARXNG_SECRET_KEY=jarvis-searxng-2026
      - SEARXNG_LIMITER=false
      - SEARXNG_DEFAULT_LANG=es-MX
    ports:
      - "8888:8080"
    networks:
      - jarvis-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == daniel-B450M-H
      restart_policy:
        condition: on-failure

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - /home/daniel/ClusterStorage/data/redis:/data
    networks:
      - jarvis-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == daniel-B450M-H
      restart_policy:
        condition: on-failure

  evolution-api:
    image: atendai/evolution-api:latest
    environment:
      - SERVER_URL=http://10.42.0.154:8090
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=jarvis-evolution-2026
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://jarvis:jarvis_db_2026@postgres:5432/evolution
      - DATABASE_CONNECTION_CLIENT_NAME=evolution
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - DATABASE_SAVE_MESSAGE_UPDATE=true
      - DATABASE_SAVE_DATA_CONTACTS=true
      - DATABASE_SAVE_DATA_CHATS=true
      - LANGUAGE=es-MX
      - DEL_INSTANCE=false
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379/6
      - CACHE_REDIS_PREFIX_KEY=evolution
      - CACHE_REDIS_SAVE_INSTANCES=true
    volumes:
      - /home/daniel/ClusterStorage/data/evolution:/evolution/instances
    ports:
      - "8090:8080"
    networks:
      - jarvis-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == daniel-B450M-H
      restart_policy:
        condition: on-failure

networks:
  jarvis-net:
    external: true
