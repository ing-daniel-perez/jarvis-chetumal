version: '3.8'

services:

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=jarvis
      - POSTGRES_PASSWORD=jarvis_db_2026
      - POSTGRES_DB=n8n
    volumes:
      - /home/daniel/ClusterStorage/data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - jarvis-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == daniel-B450M-H
      restart_policy:
        condition: on-failure

  n8n:
    image: n8nio/n8n:latest
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_USER=jarvis
      - DB_POSTGRESDB_PASSWORD=jarvis_db_2026
      - DB_POSTGRESDB_DATABASE=n8n
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_PERSONALIZATION_ENABLED=false
      - N8N_ENCRYPTION_KEY=56f196edb63cd14f729de6a09d3899325a1513978455ef3d
      - N8N_USER_MANAGEMENT_JWT_SECRET=ca48646d1be2359c4211dde66c01c0feb68c707d943257008b33e0b15e9a9e0f
      - WEBHOOK_URL=http://10.42.0.154:5678
      - GENERIC_TIMEZONE=America/Cancun
      - N8N_DEFAULT_LOCALE=es
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - /home/daniel/ClusterStorage/data/n8n:/home/node/.n8n
    ports:
      - "5678:5678"
    networks:
      - jarvis-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == daniel-B450M-H
      restart_policy:
        condition: on-failure

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - /home/daniel/ClusterStorage/data/qdrant:/qdrant/storage
    networks:
      - jarvis-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == daniel-B450M-H
      restart_policy:
        condition: on-failure

  searxng:
    image: searxng/searxng:latest
    environment:
      - SEARXNG_BASE_URL=http://10.42.0.154:8888
      - SEARXNG_SECRET_KEY=jarvis-searxng-2026
      - SEARXNG_LIMITER=false
      - SEARXNG_DEFAULT_LANG=es-MX
    ports:
      - "8888:8080"
    networks:
      - jarvis-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == daniel-B450M-H
      restart_policy:
        condition: on-failure

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - /home/daniel/ClusterStorage/data/redis:/data
    ports:
      - "6379:6379"
    networks:
      - jarvis-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == daniel-B450M-H
      restart_policy:
        condition: on-failure

networks:
  jarvis-net:
    external: true
